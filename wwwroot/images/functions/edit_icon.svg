<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <!-- Background -->
  <rect width="80" height="80" rx="16" fill="#091E2F"/>

  <!-- Pencil: drawn vertical, then rotated 45° CW so eraser is upper-right, tip is lower-left -->
  <g transform="rotate(45, 40, 40)">

    <!-- Eraser cap -->
    <rect x="33" y="11" width="14" height="11" rx="5"
          fill="#1B5E72" stroke="#85DCEF" stroke-width="1.5"/>

    <!-- Metal band -->
    <rect x="33" y="21" width="14" height="5" rx="1"
          fill="#2A7A8E" stroke="#85DCEF" stroke-width="0.75"/>

    <!-- Pencil body -->
    <rect x="33" y="25" width="14" height="29" rx="2"
          fill="#4BBECE" stroke="#85DCEF" stroke-width="1.5"/>

    <!-- Subtle shine line along body -->
    <line x1="38" y1="27" x2="38" y2="53"
          stroke="#85DCEF" stroke-width="1" opacity="0.35"/>

    <!-- Wood tip (tapered triangle) -->
    <polygon points="33,54 47,54 40,69"
             fill="#1B5E72" stroke="#85DCEF" stroke-width="1.5" stroke-linejoin="round"/>

    <!-- Graphite tip point -->
    <polygon points="37,63 43,63 40,69"
             fill="#C0EEFF" opacity="0.9"/>
  </g>
</svg>
