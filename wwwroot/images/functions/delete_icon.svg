<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <!-- Background -->
  <rect width="80" height="80" rx="16" fill="#091E2F"/>

  <!-- Handle / tab -->
  <rect x="30" y="13" width="20" height="9" rx="4.5"
        fill="#4BBECE" stroke="#85DCEF" stroke-width="1.5"/>

  <!-- Lid -->
  <rect x="16" y="21" width="48" height="9" rx="4.5"
        fill="#4BBECE" stroke="#85DCEF" stroke-width="1.5"/>

  <!-- Body -->
  <rect x="21" y="29" width="38" height="37" rx="5"
        fill="#4BBECE" stroke="#85DCEF" stroke-width="1.5"/>

  <!-- Slot lines inside body -->
  <line x1="31" y1="35" x2="31" y2="61" stroke="#091E2F" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="40" y1="35" x2="40" y2="61" stroke="#091E2F" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="49" y1="35" x2="49" y2="61" stroke="#091E2F" stroke-width="2.5" stroke-linecap="round"/>
</svg>
